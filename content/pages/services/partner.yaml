faqs:
  title: "Questions"
  items:
    - question: "Do I need to have done the Audit or Pilot first?"
      answer: "Not always, but your Revenue System should be reasonably solid. Advisory is about maintaining and evolving a working system, not building one from scratch. If your Calibration hasn't been done yet, start with the AI Readiness Audit."

    - question: "How is this different from business coaching?"
      answer: "I'm not a coach. I don't work on mindset, accountability, or personal development. This is strategic advisory focused specifically on your Revenue System — Calibration, Automation, Acceleration — and how you evolve it as your business scales."

    - question: "What if I need intensive work mid-engagement?"
      answer: "Advisory retainers are for ongoing strategic support, not intensive implementation. If something major comes up — a full repositioning, a new market entry, building out new automation — we might scope an Implementation Pilot on top. We'll work out what makes sense."

    - question: "How quickly can I start?"
      answer: "Availability is limited. I work with a small number of advisory clients at any time. If there's space, we can typically start within 2–4 weeks. If not, I'll add you to the waitlist."

