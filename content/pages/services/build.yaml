faqs:
  title: "Questions"
  items:
    - question: "Do I need to do the AI Readiness Audit first?"
      answer: "Not required, but recommended. The Audit gives us a specific roadmap before we start building. If you're already clear on your niche and what needs automating, we can move directly to the Pilot. The ₹25,000 Audit fee is credited back either way."

    - question: "How much of my time does this require?"
      answer: "Much less than you'd expect. I build it; you review key decisions. Expect 3–5 hours per week across the 6 weeks — mostly reviewing outputs and approving sequences. The rest is done for you."

    - question: "Is this just a workshop where I do all the work?"
      answer: "No. This is done-for-you. I build the systems. You approve them. I hand them over with SOPs so your team can run them. You are not the builder here — you are the client."

    - question: "What happens after the 6 weeks?"
      answer: "You own the systems. I hand over complete documentation so your team can operate everything. If you want continued support as the business evolves, we can discuss ongoing advisory."

    - question: "Why not just hire a lead generation agency?"
      answer: "Agencies assume your strategy is already right and run with it. If it fails, they blame the market. I fix the strategy first (Calibration), then build the system. That's why the system converts — the message is right before we amplify it."

