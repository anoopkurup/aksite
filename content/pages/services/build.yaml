sprints:
  section_title: "What we build"
  section_subtitle: "Three components installed in six weeks."
  items:
    - name: "Calibration"
      icon: "target"
      question: "Week 1: Get the strategy right before we automate anything."
      description: "We pick one specific niche, sharpen your offer, and design the message that attracts your best clients. This is non-negotiable — automating a bad message just means spamming more people faster. Strategy first. Always."
      outcomes:
        - "One specific niche or vertical locked in"
        - "Offer repositioned to eliminate price comparison"
        - "Message designed for the right audience"
        - "The brief we use to build everything else"

    - name: "The Hunter"
      icon: "message-square"
      question: "Weeks 2–3: AI that finds your ideal clients and starts conversations."
      description: "We build an AI-powered lead generation and outreach system targeting your specific niche. List building, connection sequences, and follow-ups — calibrated to start conversations, not blast inboxes. Designed for the relationship-driven Indian B2B market."
      outcomes:
        - "AI list-building targeting your ideal client profile"
        - "Outreach sequences that start conversations (not spam)"
        - "Automated follow-up that runs past the 5th touchpoint"
        - "20+ qualified prospects identified per week"

    - name: "The Architect"
      icon: "trending-up"
      question: "Weeks 4–6: Proposals in 12 minutes. Follow-ups on autopilot."
      description: "We automate the proposal and follow-up workflow. Client call recorded → AI extracts pain points and budget → AI matches with your service catalog → AI drafts full proposal → you review and send. What used to take 4.5 hours now takes 12 minutes."
      outcomes:
        - "Proposal workflow: 4.5 hours → 12 minutes"
        - "AI follow-up sequences that never let leads go cold"
        - "Content repurposing: one client call → 5 LinkedIn posts + newsletter + case study"
        - "Win rate improvement: 15% → 35% (speed builds trust)"

  note: "**The sequence is non-negotiable.** Calibration before The Hunter. The Hunter before The Architect. We build in order. This is why it works."

