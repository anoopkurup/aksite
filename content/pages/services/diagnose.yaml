faqs:
  title: "Questions"
  items:
    - question: "What exactly is the '100% credit guarantee'?"
      answer: "The Audit costs ₹25,000. If you decide to hire me for the Implementation Pilot within 30 days of the audit, the full ₹25,000 is credited against the Pilot fee. So if you move forward, the audit was free."

    - question: "Is this a sales call in disguise?"
      answer: "No. This is a paid session designed to give you a specific, written roadmap — regardless of what you decide to do next. Many founders take the audit and implement on their own. That's a valid outcome."

    - question: "What if I already know what's wrong?"
      answer: "Then the audit confirms it — or reveals something you hadn't seen. Founders usually know one thing is broken but miss the upstream cause. The diagnostic often reframes the problem."

    - question: "What if I need more than just an audit?"
      answer: "If the audit reveals you need a full Revenue System installed, I'll explain the Implementation Pilot. But there's no pressure — the audit stands on its own as a complete deliverable."

