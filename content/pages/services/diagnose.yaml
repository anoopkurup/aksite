qualification:
  section_title: "This is for you if…"
  for_you_if:
    - "Your business does ₹2Cr–₹15Cr and growth depends on your personal network"
    - "You have 10–50 people but you're still the only one closing deals"
    - "Leads come in but fall off because follow-up is inconsistent"
    - "Proposals sit in your draft folder because you're too busy delivering"
    - "You've tried marketing tactics and nothing has stuck"

  not_for_you_title: "This is not for you if…"
  not_for_you_if:
    - "You want someone to run your marketing for you"
    - "You're looking for a quick hack or silver bullet"
    - "You're not willing to question your current assumptions"

session_process:
  section_title: "What happens in the session"
  section_subtitle: "A structured diagnostic, not a sales call."

  stages:
    - phase: "Before the session"
      border_color: "slate-200"
      description: "You'll complete a short intake form covering your business model, current lead sources, proposal process, and where you feel the biggest drag. This means we use the 90 minutes for diagnosis, not discovery."

    - phase: "During the session (90 minutes)"
      border_color: "cta-500"
      description: "We map your complete Revenue System across all three phases:"
      layers:
        - name: "Calibration"
          question: "Is your niche specific enough? Is your offer sharp or are you selling everything to everyone?"
        - name: "Automation"
          question: "Where does your pipeline depend on you manually? What happens when you're busy with delivery?"
        - name: "Acceleration"
          question: "How predictable is your pipeline right now? What would it take to make it run without you?"
      conclusion: "I'll map the full client journey from lead to close. By the end, we'll know exactly where the leaks are."

    - phase: "After the session"
      border_color: "navy-900"
      description: "You'll receive a written Roadmap with:"
      deliverables:
        - "3 Immediate Automations — tasks you can stop doing manually this week"
        - "The Tool Stack — the exact software setup you need (under ₹4,000/month)"
        - "The ROI Model — how much revenue you unlock by fixing the leaks"

what_you_get:
  section_title: "What you get"
  items:
    - title: "A map of where you're losing deals"
      description: "60% of B2B deals close after the 5th follow-up. Most founders stop at two. The audit shows you exactly where leads are dropping off — and what to do about it."

    - title: "A specific automation roadmap"
      description: "Not a generic list of AI tools. A specific plan for your business: which three things to automate first, which tools to use, and in what sequence."

    - title: "The ROI model"
      description: "We'll calculate what fixing the leaks is worth to your business. Proposal drag, follow-up gaps, content inconsistency — each has a measurable revenue impact."

    - title: "A 100% credit guarantee"
      description: "The Audit costs ₹25,000. If you decide to move into the Implementation Pilot within 30 days, the entire ₹25,000 is credited back. The Audit becomes free if we work together."

