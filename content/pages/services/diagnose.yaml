hero:
  tier_label: "AI Readiness Audit"
  title: "Find out exactly where your pipeline is leaking."
  body:
    - "You already know something isn't working. Referrals come in. Everything else feels random. But you don't know whether it's your message, your process, or your follow-up that's the real problem."
