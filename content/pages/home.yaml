# Homepage Content — "I fix sales for founder-led services businesses"
# Last updated: 2026-06-11

meta:
  title: "Anoop Kurup — I Fix Sales for Services Businesses"
  description: "Sales systems for founder-led services firms: one packaged offer, proven against real prospects, with a weekly motion that produces conversations. Start with the free Sales Scorecard."

hero:
  headline: "I fix sales for founder-led services businesses."
  body:
    - "You've built real expertise. Clients love the work. But new business still depends on referrals you can't predict — and on you personally selling every deal."
    - "I package what you're best at into one offer the market actually responds to, and build the weekly sales motion that keeps producing conversations."
  cta_text: "Take the Sales Scorecard"
  cta_link: "/scorecard"
  cta_note: "Free · 3 minutes · instant verdict on how predictable your pipeline really is"

sound_familiar:
  section_title: "Sound familiar?"
  items:
    - symptom: "Referrals convert. Everything else fails."
      reframe: "Referrals arrive pre-sold. The fix isn't more marketing — it's an offer strangers can say yes to."
    - symptom: "Every deal is a custom negotiation."
      reframe: "When nothing is packaged, every sale starts from zero: custom scope, custom price, custom doubt."
    - symptom: "I'm the only one who can sell what we do."
      reframe: "If the pitch only works in your mouth, you don't have a sales problem — you have a packaging problem."
    - symptom: "Prospects nod, then go quiet."
      reframe: "Nodding is not buying. Deals without a felt trigger and a clear next step dissolve into “let's keep in touch.”"

how_i_fix_it:
  section_title: "How I fix it"
  stages:
    - number: "1"
      name: "Package"
      description: "We extract the skill your best clients actually paid for and shape it into one offer with a clear outcome and price. Not a rebrand — a sellable unit."
    - number: "2"
      name: "Prove"
      description: "We put that offer in front of real prospects — ten live conversations, with me in the room for the first ones. The market tells us the version it wants."
    - number: "3"
      name: "Systemise"
      description: "What survived becomes your sales system: the words, the assets, the weekly motion. Written down. Repeatable. Yours."

proof:
  section_title: "From past consulting engagements"
  items:
    - type: "Marketing Agency"
      before: "Competing on price against dozens of interchangeable agencies."
      what_we_did: "Narrowed to one vertical, repositioned the offer around outcomes, built an outbound motion."
      result: "Closed its first revenue-share deal in 45 days."
    - type: "Public-Speaking Trainer"
      before: "Running free webinars to an audience that never converted."
      what_we_did: "Dropped the broad audience and targeted corporate L&D teams with urgent needs."
      result: "Won paid corporate work at 3× the old per-engagement rate."
    - type: "School Group"
      before: "Strong reputation, but admissions stalling against newer competitors."
      what_we_did: "Repositioned the offer to parents and ran targeted admissions campaigns."
      result: "Lifted the admission rate from 70% to 94%."

qualification:
  section_title: "Who this is for"
  for_you:
    heading: "For you if…"
    items:
      - "You run a founder-led B2B services firm — consulting, agency, training, professional services"
      - "You're mostly out of day-to-day delivery — your team or systems handle the work"
      - "Growth still depends on your network and your personal selling"
      - "You want a working pipeline, not another marketing experiment"
  not_for_you:
    heading: "Not for you if…"
    items:
      - "You're still hands-on in most client delivery — fix capacity first (the Scorecard will tell you)"
      - "You want someone to run your ads — hire an agency"
      - "You're looking for hacks"

