symptoms:
  section_title: "Which of these sounds familiar?"
  items:
    - title: "Price Comparison"
      quote: "Clients compare me to cheaper competitors."
      explanation: "You're not losing on price. You're losing on clarity. When clients can't see the difference, price becomes the only way to compare."
      diagnosis: "This is a Calibration problem — your niche and offer need sharpening."

    - title: "Referral Dependence"
      quote: "Referrals convert. Everything else fails."
      explanation: "Referrals come pre-sold on you. Cold audiences don't. The difference isn't the channel — it's whether your message creates trust before the first conversation."
      diagnosis: "This is a Calibration + Automation problem — the message and the pipeline both need work."

    - title: "Marketing Not Working"
      quote: "We've tried marketing. It doesn't work for us."
      explanation: "Marketing doesn't fail. Unclear positioning does. Ads, content, outreach — they all amplify whatever's already there. If the message isn't calibrated, no automation will fix it."
      diagnosis: "Start with an AI Readiness Audit. The root cause could be Calibration, Automation, or both."

    - title: "Difficulty Explaining"
      quote: "I struggle to explain what I do."
      explanation: "If you can't explain it simply, you haven't narrowed it down enough. You're trying to describe all your expertise instead of the one problem you solve better than anyone."
      diagnosis: "This is a Calibration problem — niche, offer, and message all need work."

