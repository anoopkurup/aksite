case_studies:
  section_title: "What changes when the system is in place"
  items:
    - title: "From \"performance marketers\" to growth partners"
      type: "Marketing Agency"
      problem: "Competing on price with dozens of similar agencies. Clients saw them as interchangeable."
      root_cause: "Calibration. They were describing what they did, not the outcome they delivered."
      fix: "Repositioned as \"growth partners for offline apparel brands going online.\" Moved from project fees to revenue-share deals with larger clients."
      result: "First revenue-share deal closed within 45 days of repositioning."

    - title: "From generic webinars to corporate training contracts"
      type: "Public Speaking Trainer"
      problem: "Running free webinars to an audience that never converted. Expertise wasn't translating to paying clients."
      root_cause: "Calibration. Targeting \"anyone who wants to speak better\" instead of a specific audience with urgent need."
      fix: "Narrowed to corporate communication for mid-level managers. Built a focused offer for L&D teams."
      result: "Moved from free webinars to paid corporate contracts at 3x the per-engagement rate."

    - title: "From scattered marketing to location-centric campaigns"
      type: "School Group (3 schools)"
      problem: "Nursery admissions stuck at 70% despite active marketing. Same approach wasn't working across locations."
      root_cause: "Calibration. Three schools, three different parent demographics. One-size-fits-all messaging was missing all of them."
      fix: "Created location-centric positioning and targeted campaigns for each school based on catchment area demographics."
      result: "Nursery admission rate: 70% → 94% in the next intake cycle."

faqs:
  title: "Questions founders ask"
  items:
    - question: "How is this different from hiring a marketing consultant?"
      answer: "Most marketing consultants start with tactics — content plans, ad campaigns, lead magnets. I start with Calibration. If your niche, offer, and message aren't sharp, better tactics won't help. Automating the wrong message gets you more noise, not more clients."

    - question: "How is the Implementation Pilot different from hiring an agency?"
      answer: "An agency runs your marketing. The Pilot installs the system underneath it. When it's done, you own the workflows, the sequences, and the logic — not a monthly retainer dependency. You walk away with infrastructure, not a service contract."

    - question: "I already get referrals. Do I really need this?"
      answer: "Referrals are wonderful — but unpredictable. If your growth depends on who happens to mention you this month, you don't have a Revenue System. You have a network. Networks plateau. Systems scale."

    - question: "What kinds of businesses do you work with?"
      answer: "Founder-led B2B service firms doing ₹2Cr–₹15Cr — consultants, agencies, trainers, professional services. Typically 10–50 people where the founder is still the only one closing deals. India-based, though the work happens remotely."

    - question: "How quickly will I see results?"
      answer: "Calibration can happen in the first week. AI workflows go live in weeks two through four. Most clients see meaningful changes in pipeline quality within 60–90 days of the system being installed."

    - question: "What if I just need advice, not a full engagement?"
      answer: "Start with an AI Readiness Audit. 90 minutes to map where your Revenue System is leaking and what to automate first. You'll leave with a written roadmap — whether you work with me further or not."

