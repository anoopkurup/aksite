meta:
  title: "Pipeline Reality Check"
  description: "Send me your last 12 months of deals. One week later, a written verdict on where your next clients will come from — and where they won't. ₹25,000."

hero:
  tier_label: "₹25,000 · One Week · Done-for-You"
  title: "Pipeline Reality Check"
  subtitle: "Where your next clients are coming from — and where they're not."
  body:
    - "The Scorecard gives you a read in three minutes. This gives you the truth from your own numbers. Send me your last 12 months of deals — source, size, time-to-close, and who sold each one. One week later, you get a written verdict on the state of your pipeline and the three moves that change it."
    - "No call that evaporates. No generic advice. A document built entirely from your actual data, that you can read, keep, and act on."

what_you_get:
  section_title: "What you get"
  items:
    - "How dependent you are on referrals — the exact share of revenue that arrives pre-sold, and what that leaves exposed."
    - "Where your revenue is concentrated — client-concentration risk, named and quantified, including the accounts whose departure would hurt."
    - "What your current way of selling will produce — a straight six-month pipeline projection at the rate you're selling today: here's what's coming, and what isn't."
    - "The three moves that change it — prioritised, specific to your situation, in the order I'd make them."
    - "A straight answer on what's next — whether CLEAR is your logical next step, including an honest “not yet” if that's the truth."

terms:
  headline: "₹25,000 · one week · fully done for you."
  body: "You send the data; you receive the verdict. No homework, and no long engagement to commit to — a single, contained piece of work that makes the abstract concrete."
  credit_note: "The full ₹25,000 counts toward a CLEAR engagement if you go ahead — so if CLEAR is your next step, the diagnostic effectively cost you nothing."

faqs:
  title: "Questions people ask"
  items:
    - question: "What data do you need from me?"
      answer: "A simple list of your deals from the last 12 months: where each one came from, roughly how big it was, how long it took to close, and who did the selling. A spreadsheet is perfect. If it lives in your head or your inbox, I'll send you a one-page template to pull it together."

    - question: "What if my data is messy or incomplete?"
      answer: "Then that's finding number one. How well a firm can see its own pipeline is itself a diagnosis — and a common one. I'll work with what you have and tell you plainly what the gaps mean."

    - question: "What happens after?"
      answer: "One of three things: CLEAR is the fit and we talk about it, with your ₹25,000 credited to the kickoff; something smaller is the right next move and I'll point you to it; or it's genuinely “not yet,” and I'll tell you what would need to change. No pressure, no default upsell."

