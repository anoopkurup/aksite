faqs:
  title: "Questions"
  items:
    - question: "What data do you need from me?"
      answer: "Your last 12 months of deals: source, size, time-to-close, and who sold each one. A spreadsheet is plenty. If it lives in a CRM, an export works. I'll send a simple template so you're not guessing what to pull."

    - question: "What if my data is messy?"
      answer: "Then that's finding number one. Messy or missing data is itself a signal about how visible your pipeline really is. I work with what you have and tell you what the gaps mean — I don't send it back for cleanup."

    - question: "What happens after?"
      answer: "If CLEAR fits, that's the recommendation — and your ₹25,000 is credited toward it. If it doesn't fit yet, I'll say so plainly and tell you what to do first. An honest “not yet” is a valid outcome."

