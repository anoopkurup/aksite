      description: "Consultants, agencies, trainers, professional services firms. People who sell expertise, not products. Businesses built on knowledge and relationships."

    - title: "10+ years of experience, 5+ years in business."
      description: "You're not new to this. You've built something real. But growth has stalled, and you're not sure why."

    - title: "Solo or small teams."
      description: "Typically working alone or with 2–3 people. No large corporate structure. Decisions happen fast when clarity exists."

    - title: "Based in India, usually Bangalore."
      description: "Though the work happens remotely. What matters is the fit, not the location."

  not_for_you:
    title: "NOT in IT/Software."
    description: "I work with knowledge services and professional services. If you're building software products, I'm probably not the right fit."

who_im_not_for:
  section_title: "Who I'm not for"
  section_subtitle: "Honesty saves everyone time"
  items:
    - heading: "If you want someone to run your marketing"
      text: "hire an agency. I fix foundations, not funnels."

    - heading: "If you're looking for quick hacks"
      text: "we won't be a good fit. I build things that last."

    - heading: "If you're not willing to question assumptions"
      text: "the diagnosis process requires honesty about what's not working. If you've already decided you know the answer, you don't need me."

    - heading: "If you want a cheerleader"
      text: "I'll tell you what I see, not what you want to hear. Kind, but honest."

