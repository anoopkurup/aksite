meta:
  title: "About | Anoop Kurup"
  description: "I fix foundations, not funnels. Most marketing consultants start with tactics. I start with a question: Why isn't what you're doing working?"

hero:
  eyebrow: "About Anoop Kurup"
  headline: "I fix foundations, not funnels."
  body:
    - "Most marketing consultants start with tactics. I start with a question: Why isn't what you're doing working?"
    - "Usually, the answer has nothing to do with marketing."

backstory:
  section_title: "How I got here"
  image:
    src: "/images/about/anoop-bw.webp"
    alt: "Anoop Kurup"
  intro: "I didn't start in marketing. I started in research."

  timeline:
    - title: "Five years at GE Global Research"
      description: "Working on water purification and clean energy technologies. My job was to understand problems deeply before proposing solutions. To separate symptoms from root causes. To see what others were missing."

    - title: "Five years running an IPR firm"
      description: "Helping companies understand competitive landscapes, protect innovations, and make strategic decisions about where to invest. We built something valuable enough that it got acquired."

    - title: "Then I moved into marketing"
      description:
        - "Not because I loved campaigns or content — but because I kept seeing the same pattern: smart founders with real expertise, struggling to grow. Not because they lacked skills. Because they lacked clarity."
        - "They were trying to market everything they knew, instead of solving one clear problem for one clear audience."

  insight: "That's when I realised: marketing problems are rarely marketing problems. They're clarity problems dressed up in marketing clothes."

work:
  section_title: "Revenue Systems Architect"
  section_subtitle: "The work I do now"
  body:
    - "I work with expert-founders of services businesses — consultants, agencies, trainers, professional services firms. People who've built real expertise over 10+ years but find themselves stuck. Dependent on referrals. Unable to grow beyond their network."

  pattern_box:
    label: "The Pattern"
    paragraphs:
      - "They've tried marketing. It didn't work. So they assume they're bad at marketing, or their industry is different, or they just need to find the right tactic."
      - "But the problem isn't tactics. It's that they're trying to automate before they've calibrated — running AI workflows on a message that doesn't convert."

  approach:
    title: "That's where I come in."
    paragraphs:
      - "I use the Revenue System Architecture™ — a three-phase framework that installs a revenue engine for your business. First we Calibrate (fix your niche, offer, and message). Then we Automate (build AI-powered workflows). Then comes Acceleration — a predictable pipeline that runs without you."
      - "I don't run your marketing. I build the system underneath it. The result: clients that come to you because the system works, not because you happened to get a referral this month."

beliefs:
  section_title: "What I believe"
  section_subtitle: "The principles behind the work"
  items:
    - title: "Clarity before tactics."
      description: "Too many businesses jump straight to execution — content plans, ad campaigns, lead magnets — without understanding who they serve, what makes them different, or why anyone should care. Tactics amplify whatever's already there. If there's no clarity, there's nothing to amplify."

    - title: "Sequence matters."
      description: "You can't Automate if you haven't Calibrated. Automating the wrong message at scale doesn't get you more clients — it gets you more noise. Most founders skip Calibration and wonder why their AI tools don't work."

    - title: "Foundations compound. Tactics don't."
      description: "A quick hack might get you a short-term bump. A solid foundation keeps working as you grow. I'm not interested in growth hacks. I'm interested in clarity that compounds."

    - title: "Expertise isn't enough."
      description: "Being great at what you do doesn't mean clients will find you. Expertise needs clarity to become visible. Otherwise, you're the best-kept secret in your industry."

    - title: "Referrals are wonderful — but not a strategy."
      description: "If your growth depends on who happens to mention you this month, you don't have a growth system. You have a network. Networks plateau. Clarity compounds."

who_i_work_with:
  section_title: "Who I work with"
  section_subtitle: "The founders I'm built to help"
  for_you:
