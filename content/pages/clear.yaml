# CLEAR Engagement Page
# Last updated: 2026-06-30 (CLEAR v5 copy + 26-Jun-2026 commercial model)

meta:
  title: "CLEAR — The Sales System, Installed"
  description: "The engagement where I install your sales system: one packaged offer the market has responded to, and a weekly routine you've run with me on the calls."

hero:
  tier_label: "The Engagement"
  title: "CLEAR: the sales system, installed."
  body:
    - "One packaged offer your market has already responded to. A working outreach routine you've already run, with me on the calls beside you. Written down, repeatable, and yours to keep."
    - "Most consultants hand you a strategy and leave. CLEAR doesn't stop at the plan — it stays until the selling actually works. Over three months we build the offer, prove it against real buyers, and turn what survives into a system you can run without me."

stages:
  section_title: "How it works"
  items:
    - number: "1"
      name: "Package"
      description: "We start with your best clients — the ones who paid well and were happy — and find the pattern: the specific thing you did that produced their result. That's your core skill, and it's usually hiding inside your stories rather than your job title. We shape it into one offer with a named outcome and a clear price — and if a single craft skill would just get compared to every other freelancer, we combine it with an adjacent strength so it stands as its own category. You'll end the first three weeks with two or three offer versions, each one you can say out loud to a stranger without a script. The one you say most naturally is the one we lead with — because you are the channel, and an offer you can't say doesn't exist."
    - number: "2"
      name: "Prove & Sell"
      description: "This is the heart of it, and where most of the three months goes. We put the offer in front of real prospects, and we sell it together — I'm on your sales calls with you, handling objections and closing side by side, until it works in your mouth. We start with your own contacts — dormant clients, past almost-clients, old colleagues — because that's where trust already exists and conversations can start in week one. Then I build a cold outreach channel — target list, message sequences, the introduction process — so the pipeline doesn't dry up when your network is exhausted. Every conversation teaches us something; when three prospects react the same way, we adjust the offer. The market, not a workshop, decides the final shape."
    - number: "3"
      name: "Systemise"
      description: "Only now do we write the offer down — as a record of what the market approved, not a guess made in advance. You get the language that worked, the price that held, the objections and the answers that handled them. Alongside it, a sales operations kit built and refined during the live selling: a discovery-call template, objection-handling scripts, follow-up sequences, a qualification checklist, the cold-outreach process, and your weekly sales routine. This is the part that makes the system survive without me — a documented, repeatable way to sell that you, or a future hire, can run."

leave_with:
  section_title: "What you leave with"
  items:
    - "A validated offer — pitched live to ten or more real prospects and refined on what they actually said, with a category, price, and guarantee that survived contact with buyers."
    - "The market evidence file — verbatim prospect reactions, the objections you met, and the answers that worked. Proof of what the market wants, in its own words."
    - "Message templates that got replies — not “should get replies.” The actual words that started conversations."
    - "A weekly outreach routine you've already run — across two channels, your warm network and a cold channel I built, so you're not starting from a blank page when the engagement ends."
    - "A sales operations kit — discovery-call template, objection-handling scripts, follow-up sequences, qualification checklist, and your weekly routine. The repeatable how-to."
    - "A written case study, authored by me — your first proof asset, written up properly, not left as homework you'll never get to."

dont_promise:
  section_title: "What I don't promise"
  body:
    - "I won't promise you a signed client by a particular date. No honest consultant can — whether a specific deal closes depends on your sales cycle, which neither of us fully controls."
    - "What I promise is the process, the evidence, and a working pipeline: an offer the market has responded to, the assets that earned those responses, and a cadence still producing conversations at handoff. Some clients close a deal inside the engagement; most close in the weeks after, on the system they now own."

pace:
  section_title: "The pace"
  body: "Three stages over three months. The offer is built and the first outreach goes live inside the first three weeks; the rest of the time is spent selling alongside you and turning what works into a system. The work is paced by milestones, not a rigid calendar — we move at the speed your decisions and conversations allow, and I hold you to clear turnaround windows so it never drifts."

investment:
  section_title: "The investment"
  title: "₹2.5 lakh over three months"
  description: "₹50,000 to start, then ₹1 lakh at the beginning of months 2 and 3 — each month paid in advance and month-to-month, so you continue only if it's working. You're not betting ₹2.5 lakh up front; the work earns each renewal, and if it isn't delivering you stop at the next month and keep everything we've built. A ₹75,000 Lite tier serves smaller firms (under ₹1 Cr). The price is quoted after a Pipeline Reality Check, so you see your situation in your own numbers before committing to anything larger."
  credit_note: "The ₹25,000 Pipeline Reality Check fee counts toward your CLEAR kickoff."

